name: CI
on:
    push:
        branches: [ ]
    pull_request:
        branches: [ master ]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
          - name: Check out repository
            uses: actions/checkout@v4
            with:
                fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          - name: Run the build process inside Docker container
            uses: addnab/docker-run-action@v3
            with:
                image: wltjr/docker-efl:latest
                options: |
                    -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }}
                    --privileged
                    -v ${{ github.workspace }}:/tmp/entrance
                run: |
                    cd /tmp/entrance
                    meson setup --prefix /usr --buildtype=debug -Dcheck=true -Dpam=true -Dlogind=true . build
                    build-wrapper-linux-x86-64 --out-dir bw-output  ninja -C build
                    ninja -C build install
                    meson test -C build -v
                    ./tests/run-tests.sh
                    gcovr --sonarqube build/coverage.xml build/
                    export PATH="/sonar-scanner-linux-x64/bin:${PATH}"; sonar-scanner
